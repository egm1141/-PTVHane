<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTVHane Pro</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b10;--panel:#0d1117;--card:#111720;--hover:#161e2e;
  --accent:#00d4ff;--accent2:#0055ff;--glow:rgba(0,212,255,.15);
  --red:#ff3b5c;--green:#00ff88;--orange:#ff9500;
  --text:#e8edf5;--dim:#5a6a7e;
  --bdr:rgba(0,212,255,.12);--bdrb:rgba(0,212,255,.32);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ═══ LOGIN ═══ */
#loginScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#0a1628,#040810);overflow:hidden;}
#loginScreen::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 39px,rgba(0,212,255,.025) 39px,rgba(0,212,255,.025) 40px),
             repeating-linear-gradient(90deg,transparent 0,transparent 39px,rgba(0,212,255,.025) 39px,rgba(0,212,255,.025) 40px);
  pointer-events:none;}
.lglow{position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,80,255,.07),transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-58%);pointer-events:none;}
.lbox{position:relative;width:420px;background:linear-gradient(155deg,#0f1c2e,#070c17);
  border:1px solid var(--bdrb);border-radius:18px;padding:38px 34px 30px;
  box-shadow:0 30px 90px rgba(0,0,0,.7),0 0 50px rgba(0,80,255,.07);
  animation:popUp .45s cubic-bezier(.22,.68,0,1.2);}
@keyframes popUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.ltl{position:absolute;top:12px;left:12px;width:18px;height:18px;border-top:2px solid var(--accent);border-left:2px solid var(--accent);}
.lbr{position:absolute;bottom:12px;right:12px;width:18px;height:18px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);}
.llogo{text-align:center;margin-bottom:28px;}
.llogo-icon{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:14px;font-size:26px;
  box-shadow:0 0 26px rgba(0,212,255,.4);margin-bottom:13px;}
.llogo h1{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;letter-spacing:4px;}
.llogo h1 b{color:var(--accent);font-weight:900;}
.llogo p{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-top:4px;}
.ltabs{display:flex;background:rgba(0,0,0,.4);border-radius:10px;padding:4px;margin-bottom:24px;border:1px solid var(--bdr);}
.ltab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--dim);cursor:pointer;border-radius:7px;transition:all .2s;}
.ltab.on{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;box-shadow:0 0 14px rgba(0,212,255,.3);}
.ltab:not(.on):hover{color:var(--text);background:rgba(255,255,255,.04);}
.lf{margin-bottom:14px;}
.ll{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:block;}
.liw{position:relative;display:flex;align-items:center;}
.lic{position:absolute;left:12px;font-size:13px;color:var(--dim);pointer-events:none;}
.li{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:8px;
  color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;padding:11px 12px 11px 36px;outline:none;transition:all .2s;}
.li:focus{border-color:var(--accent);background:rgba(0,212,255,.04);box-shadow:0 0 0 3px rgba(0,212,255,.08);}
.li::placeholder{color:var(--dim);}
.pwbtn{position:absolute;right:10px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;transition:color .2s;}
.pwbtn:hover{color:var(--accent);}
.lrem{display:flex;align-items:center;gap:8px;margin-bottom:20px;cursor:pointer;font-size:12px;color:var(--dim);}
.lrem input{width:14px;height:14px;accent-color:var(--accent);}
.lbtn{width:100%;padding:13px;border:none;border-radius:8px;color:#fff;font-family:'Exo 2',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.lbtn.bl{background:linear-gradient(135deg,var(--accent2),var(--accent));box-shadow:0 0 22px rgba(0,212,255,.25);}
.lbtn.gr{background:linear-gradient(135deg,#1a5c3a,#00c97a);box-shadow:0 0 22px rgba(0,255,136,.2);}
.lbtn:hover{transform:translateY(-1px);filter:brightness(1.12);}
.lbtn:active{transform:none;}
.lbtn.ld{pointer-events:none;opacity:.6;}
.lerr{display:none;margin-top:12px;padding:10px 14px;background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);
  border-radius:6px;font-size:12px;color:#ff7088;text-align:center;}
.gnote{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);border-radius:7px;
  padding:10px 12px;font-size:12px;color:#6effc0;margin-bottom:14px;line-height:1.5;}

/* ═══ APP ═══ */
#app{display:none;flex-direction:column;height:100vh;width:100%;}
.tbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:46px;
  background:linear-gradient(90deg,#090e17,#0c1420);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;letter-spacing:2px;}
.logo-i{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(0,212,255,.4);}
.logo b{color:var(--accent);}
.logo em{color:var(--dim);font-style:normal;font-size:10px;letter-spacing:3px;margin-left:4px;}
.navtabs{display:flex;gap:4px;}
.ntab{padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--dim);cursor:pointer;
  border-radius:4px;border:1px solid transparent;transition:all .2s;text-transform:uppercase;}
.ntab:hover{color:var(--accent);border-color:var(--bdr);}
.ntab.on{color:var(--accent);border-color:var(--bdrb);background:var(--glow);}
.tbar-r{display:flex;align-items:center;gap:10px;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.uchip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--bdr);
  border-radius:20px;padding:3px 10px 3px 6px;font-size:11px;font-weight:600;color:var(--dim);}
.uav{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:10px;}
.main{display:flex;flex:1;overflow:hidden;}

/* ═══ SIDEBAR ═══ */
.sidebar{width:272px;background:var(--panel);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;}
.sbhead{padding:11px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;}
.sbox{flex:1;display:flex;align-items:center;background:var(--card);border:1px solid var(--bdr);
  border-radius:6px;padding:0 10px;gap:8px;transition:border-color .2s;}
.sbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow);}
.sbox input{background:none;border:none;outline:none;color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;padding:7px 0;width:100%;}
.sbox input::placeholder{color:var(--dim);}

/* category side panel */
.catpanel{width:100%;overflow-x:auto;display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.catpanel::-webkit-scrollbar{height:3px;}
.catpanel::-webkit-scrollbar-thumb{background:var(--bdrb);border-radius:2px;}
.cbtn{flex-shrink:0;padding:5px 11px;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--dim);
  background:var(--card);border:1px solid var(--bdr);border-radius:20px;cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap;}
.cbtn:hover{color:var(--text);border-color:var(--bdrb);}
.cbtn.on{color:var(--accent);border-color:var(--accent);background:var(--glow);}

.slist{flex:1;overflow-y:auto;padding:6px;}
.slist::-webkit-scrollbar{width:4px;}
.slist::-webkit-scrollbar-thumb{background:var(--bdrb);border-radius:2px;}
.glabel{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;padding:10px 8px 5px;}

/* channel row */
.chitem{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;cursor:pointer;
  transition:all .15s;border:1px solid transparent;margin-bottom:2px;}
.chitem:hover{background:var(--hover);border-color:var(--bdr);}
.chitem.on{background:linear-gradient(90deg,rgba(0,212,255,.1),transparent);border-color:var(--bdrb);}
.chitem.on .chn{color:var(--accent);}
.chlogo{width:36px;height:36px;border-radius:6px;background:var(--card);display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--bdr);overflow:hidden;}
.chlogo img{width:100%;height:100%;object-fit:cover;}
.chinf{flex:1;min-width:0;}
.chn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chm{font-size:11px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 5px;border-radius:3px;flex-shrink:0;}
.bl{background:var(--red);color:#fff;}
.bv{background:rgba(255,149,0,.15);color:var(--orange);border:1px solid rgba(255,149,0,.3);}
.bs{background:rgba(0,212,255,.12);color:var(--accent);border:1px solid rgba(0,212,255,.25);}

/* grid */
.grid-wrap{flex:1;overflow-y:auto;padding:10px;}
.grid-wrap::-webkit-scrollbar{width:4px;}
.grid-wrap::-webkit-scrollbar-thumb{background:var(--bdrb);border-radius:2px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:9px;}
.gcard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .2s;}
.gcard:hover{border-color:var(--bdrb);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.5);}
.gcard.on{border-color:var(--accent);box-shadow:0 0 12px var(--glow);}
.gthumb{width:100%;aspect-ratio:2/3;background:var(--hover);display:flex;align-items:center;justify-content:center;
  font-size:28px;overflow:hidden;position:relative;}
.gthumb img{width:100%;height:100%;object-fit:cover;display:block;}
.gplay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;font-size:24px;}
.gcard:hover .gplay{display:flex;}
.gtitle{font-size:11px;font-weight:600;padding:5px 7px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gyear{font-size:10px;color:var(--dim);padding:0 7px 6px;}

/* loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--dim);font-size:13px;}
.spin{width:26px;height:26px;border:2px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ═══ VIDEO ═══ */
.varea{flex:1;display:flex;flex-direction:column;background:#000;}
.vscreen{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#vp{width:100%;height:100%;object-fit:contain;display:none;}
.nosig{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--dim);padding:20px;text-align:center;}
.nsico{font-size:60px;opacity:.17;}
.nsttl{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--dim);}
.nsmsg{font-size:13px;opacity:.45;max-width:280px;}
.scanline{position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:scan 4s linear infinite;opacity:.18;pointer-events:none;}
@keyframes scan{0%{top:0}100%{top:100%}}
.ovl{position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.72);border:1px solid var(--bdrb);backdrop-filter:blur(8px);
  border-radius:8px;padding:7px 14px;opacity:0;transition:opacity .3s;pointer-events:none;}
.vscreen:hover .ovl{opacity:1;}
.ovlname{font-size:14px;font-weight:700;}
.ovltime{font-size:12px;color:var(--accent);}
.ctl{top:10px;left:10px;} .cbr{bottom:10px;right:10px;}
.ctl,.cbr{position:absolute;width:16px;height:16px;pointer-events:none;}
.ctl{border-top:2px solid var(--accent);border-left:2px solid var(--accent);}
.cbr{border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);}

/* controls bar */
.cbar{height:74px;background:linear-gradient(180deg,#050a0f,var(--panel));border-top:1px solid var(--bdr);
  display:flex;flex-direction:column;padding:0 18px;justify-content:center;gap:7px;flex-shrink:0;}
.prow{display:flex;align-items:center;gap:12px;}
.tdisp{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;min-width:88px;}
.pbar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;cursor:pointer;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;width:0%;transition:width .4s linear;}
.crow{display:flex;align-items:center;gap:5px;}
.cb{width:34px;height:34px;border-radius:6px;background:var(--card);border:1px solid var(--bdr);
  color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0;}
.cb:hover{color:var(--accent);border-color:var(--bdrb);background:var(--glow);}
.cb.pbtn{width:40px;height:40px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;color:#fff;font-size:16px;box-shadow:0 0 14px rgba(0,212,255,.3);}
.cb.pbtn:hover{box-shadow:0 0 22px rgba(0,212,255,.5);transform:scale(1.05);}
.sp{flex:1;}
.vs{-webkit-appearance:none;width:76px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;outline:none;cursor:pointer;}
.vs::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;}
.chnum{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--dim);margin-left:4px;}

/* ═══ INFO PANEL ═══ */
.ipanel{width:220px;background:var(--panel);border-left:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.ihead{padding:11px 13px;border-bottom:1px solid var(--bdr);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);flex-shrink:0;}
.iscroll{flex:1;overflow-y:auto;}
.iscroll::-webkit-scrollbar{width:4px;}
.iscroll::-webkit-scrollbar-thumb{background:var(--bdrb);border-radius:2px;}
.epgi{padding:10px 13px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .15s;}
.epgi:hover{background:var(--hover);}
.epgi.now{border-left:2px solid var(--accent);}
.epgt{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:3px;}
.epgtt{font-size:13px;font-weight:600;margin-bottom:2px;}
.epgb{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:5px;overflow:hidden;}
.epgbf{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;}
.nowbadge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;background:var(--red);color:#fff;border-radius:3px;margin-left:5px;vertical-align:middle;}
.vinfo{padding:13px;overflow-y:auto;}
.vinfo::-webkit-scrollbar{width:4px;}
.vinfo::-webkit-scrollbar-thumb{background:var(--bdrb);border-radius:2px;}
.vposter{width:100%;aspect-ratio:2/3;border-radius:8px;background:var(--card);margin-bottom:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:36px;}
.vposter img{width:100%;height:100%;object-fit:cover;}
.vtitle{font-size:13px;font-weight:700;margin-bottom:6px;line-height:1.4;}
.vmeta{font-size:11px;color:var(--dim);line-height:1.8;}
.vstar{color:#ffd700;font-size:12px;margin-top:5px;}
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="loginScreen">
  <div class="lglow"></div>
  <div class="lbox">
    <div class="ltl"></div><div class="lbr"></div>
    <div class="llogo">
      <div><div class="llogo-icon">▶</div></div>
      <h1>IPTV<b>HANE</b></h1>
      <p>Pro Player · v2.0</p>
    </div>
    <div class="ltabs">
      <div class="ltab on" id="tabU" onclick="stab('u')">👤 Kullanıcı</div>
      <div class="ltab" id="tabG" onclick="stab('g')">🌐 Misafir</div>
    </div>
    <!-- Kullanıcı formu — URL gömülü -->
    <div id="fU">
      <div class="lf">
        <label class="ll">👤 Kullanıcı Adı</label>
        <div class="liw"><span class="lic">👤</span>
          <input class="li" id="lU" type="text" placeholder="kullanici_adi" autocomplete="username"></div>
      </div>
      <div class="lf">
        <label class="ll">🔒 Şifre</label>
        <div class="liw"><span class="lic">🔒</span>
          <input class="li" id="lP" type="password" placeholder="••••••••">
          <button class="pwbtn" id="pwB" onclick="tpw('lP','pwB')">👁</button></div>
      </div>
      <label class="lrem"><input type="checkbox" id="rem" checked> Beni hatırla</label>
      <button class="lbtn bl" id="lBtn" onclick="doLogin()">▶ &nbsp;BAĞLAN</button>
    </div>
    <!-- Misafir formu -->
    <div id="fG" style="display:none">
      <div class="gnote">🌐 Kendi panel bilgilerinizle bağlanabilirsiniz.</div>
      <div class="lf">
        <label class="ll">🌐 Sunucu URL</label>
        <div class="liw"><span class="lic">🔗</span>
          <input class="li" id="gUrl" type="url" placeholder="http://sunucu.com:8080"></div>
      </div>
      <div class="lf">
        <label class="ll">👤 Kullanıcı Adı</label>
        <div class="liw"><span class="lic">👤</span>
          <input class="li" id="gU" type="text" placeholder="kullanici_adi"></div>
      </div>
      <div class="lf">
        <label class="ll">🔒 Şifre</label>
        <div class="liw"><span class="lic">🔒</span>
          <input class="li" id="gP" type="password" placeholder="••••••••">
          <button class="pwbtn" id="gpwB" onclick="tpw('gP','gpwB')">👁</button></div>
      </div>
      <button class="lbtn gr" id="gBtn" onclick="doGuest()">🌐 &nbsp;MİSAFİR GİRİŞİ</button>
    </div>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="app">
  <div class="tbar">
    <div class="logo"><div class="logo-i">▶</div><div>IPTV<b>HANE</b><em>PRO</em></div></div>
    <div class="navtabs">
      <div class="ntab on" onclick="goSec('live',this)">📡 Canlı</div>
      <div class="ntab" onclick="goSec('vod',this)">🎬 Film</div>
      <div class="ntab" onclick="goSec('series',this)">📺 Dizi</div>
    </div>
    <div class="tbar-r">
      <div class="sdot"></div>
      <div class="uchip"><div class="uav">👤</div><span id="uname">—</span></div>
    </div>
  </div>

  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sbhead">
        <div class="sbox">
          <span>🔍</span>
          <input type="text" placeholder="Ara..." id="srch" oninput="doSearch(this.value)">
        </div>
      </div>
      <div class="catpanel" id="catpanel"></div>
      <div class="slist" id="slist">
        <div class="loading"><div class="spin"></div>Yükleniyor...</div>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="varea">
      <div class="vscreen" id="vscr">
        <div class="scanline"></div>
        <div class="ctl"></div><div class="cbr"></div>
        <video id="vp"></video>

          <div class="nsttl" id="nsttl">IPTVHane Pro</div>

          <span id="ovlN">—</span>

          <span class="tdisp" id="tdp">00:00 / 00:00</span>

        </div>

    <!-- INFO -->

      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const PANEL = 'http://tinyurl.com/hdvip1'; // gömülü URL

let S = {url:'',user:'',pass:''};
let sec = 'live';
let allItems = [], cats = [];
let curCat = 'all', curSrch = '';
let activeId = null, activeIdx = -1;
let playing = false, muted = false;
let hls = null;

const vp = document.getElementById('vp');
const pbtn = document.getElementById('pbtn');

// ═══════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════
function stab(t) {
  const u = t==='u';
  id('tabU').classList.toggle('on',u); id('tabG').classList.toggle('on',!u);
  id('fU').style.display = u?'block':'none';
  id('fG').style.display = u?'none':'block';
  id('lerr').style.display='none';
}
function tpw(ii,bi){const i=id(ii),b=id(bi);i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'👁':'🙈';}
function doLogin(){
  const u=id('lU').value.trim(), p=id('lP').value;
  if(!u||!p){return serr('Kullanıcı adı ve şifre gerekli.');}
  S={url:PANEL,user:u,pass:p};
  setld('lBtn',true,'▶ &nbsp;BAĞLAN');
  doConnect('lBtn','▶ &nbsp;BAĞLAN',u);
}
function doGuest(){
  const url=id('gUrl').value.trim(),u=id('gU').value.trim(),p=id('gP').value;
  if(!url||!u||!p){return serr('Tüm alanları doldurun.');}
  S={url:url,user:u,pass:p};
  setld('gBtn',true,'🌐 &nbsp;MİSAFİR GİRİŞİ');
  doConnect('gBtn','🌐 &nbsp;MİSAFİR GİRİŞİ',u+' (Misafir)');
}
function doConnect(btn,txt,name){
  const base=cln(S.url);
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),8000);
  fetch(`${base}/player_api.php?username=${e(S.user)}&password=${e(S.pass)}`,{signal:ctrl.signal})
    .then(r=>r.json())
    .then(d=>{clearTimeout(t);setld(btn,false,txt);
      if(d&&d.user_info&&d.user_info.auth==0){serr('Kullanıcı adı veya şifre hatalı.');}
      else launch(name);
    })
    .catch(()=>{clearTimeout(t);setld(btn,false,txt);launch(name);});
}
function serr(m){const el=id('lerr');el.textContent='⚠ '+m;el.style.display='block';}
function setld(i,on,txt){const b=id(i);b.classList.toggle('ld',on);b.innerHTML=on?'⏳ Bağlanıyor...':txt;}
function launch(name){
  id('uname').textContent=name;
  const ls=id('loginScreen');
  ls.style.transition='opacity .4s,transform .4s';
  ls.style.opacity='0';ls.style.transform='scale(1.03)';
  setTimeout(()=>{
    ls.style.display='none';
    const app=id('app');app.style.display='flex';
    app.style.opacity='0';app.style.transition='opacity .3s';
    setTimeout(()=>app.style.opacity='1',20);
    goSec('live',document.querySelector('.ntab'));
  },380);
}

// ═══════════════════════════════════════════════════
// SECTION
// ═══════════════════════════════════════════════════
function goSec(s,el){
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  sec=s; curCat='all'; curSrch='';
  id('srch').value='';
  allItems=[]; cats=[];
  setNosig(s==='live'?'📡':s==='vod'?'🎬':'📺',
    s==='live'?'Canlı Yayınlar':s==='vod'?'Filmler':'Diziler','Yükleniyor...');
  id('slist').innerHTML='<div class="loading"><div class="spin"></div>Yükleniyor...</div>';
  id('catpanel').innerHTML='';
  if(s==='live') loadLive();
  else if(s==='vod') loadVod();
  else loadSeries();
}

// ═══════════════════════════════════════════════════
// M3U PARSE — panelden M3U çekip ayrıştır
// ═══════════════════════════════════════════════════
function getM3U(type, cb){
  const base=cln(S.url);
  // Xtream M3U endpoint
  let url;
  if(type==='live')   url=`${base}/get.php?username=${e(S.user)}&password=${e(S.pass)}&type=m3u_plus&output=ts`;
  else if(type==='vod')    url=`${base}/get.php?username=${e(S.user)}&password=${e(S.pass)}&type=m3u_plus&output=ts&cat=vod`;
  else                     url=`${base}/get.php?username=${e(S.user)}&password=${e(S.pass)}&type=m3u_plus&output=ts&cat=series`;

  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),20000);
  fetch(url,{signal:ctrl.signal})
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(txt=>{clearTimeout(t);cb(parseM3U(txt,type));})
    .catch(err=>{
      clearTimeout(t);
      console.warn('M3U fetch failed, trying API:',err.message);
      // Fallback: Xtream API JSON
      apiFetch(type==='live'?'get_live_streams':type==='vod'?'get_vod_streams':'get_series','',d=>cb(fromAPI(d,type)));
    });
}

function parseM3U(txt, type){
  const lines=txt.split('\n');
  const items=[];
  let cur={};
  lines.forEach(l=>{
    l=l.trim();
    if(l.startsWith('#EXTINF')){
      cur={};
      cur.name = (l.match(/,(.+)$/) || [])[1] || 'İsimsiz';
      cur.logo = (l.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
      cur.group= (l.match(/group-title="([^"]*)"/) || [])[1] || 'Diğer';
      cur.id   = (l.match(/tvg-id="([^"]*)"/) || [])[1] || '';
      // extract stream id for cover
      cur.streamId=(l.match(/tvg-id="(\d+)"/) || [])[1] || '';
    } else if(l && !l.startsWith('#') && cur.name){
      cur.url=l;
      cur.type=type;
      // VOD cover from URL stream id
      if(type==='vod'||type==='series'){
        const m=l.match(/\/(\d+)\.(mp4|ts|mkv|m3u8)$/i);
        if(m) cur.streamId=m[1];
      }
      items.push({...cur});
      cur={};
    }
  });
  return items;
}

function fromAPI(data, type){
  if(!Array.isArray(data)||!data.length) return [];
  const base=cln(S.url);
  return data.map(d=>{
    let url='', group='', name='', logo='', year='', rating='', cover='', sid='';
    if(type==='live'){
      name=d.name||''; group=d.category_id||''; logo=d.stream_icon||'';
      sid=d.stream_id;
      url=`${base}/live/${e(S.user)}/${e(S.pass)}/${d.stream_id}.m3u8`;
    } else if(type==='vod'){
      name=d.name||''; group=d.category_id||''; logo=d.stream_icon||d.cover||'';
      cover=d.cover||''; year=d.year||''; rating=d.rating||''; sid=d.stream_id;
      url=`${base}/movie/${e(S.user)}/${e(S.pass)}/${d.stream_id}.${d.container_extension||'mp4'}`;
    } else {
      name=d.name||''; group=d.category_id||''; logo=d.cover||'';
      cover=d.cover||''; year=d.year||''; rating=d.rating||''; sid=d.series_id;
    }
    return {name,group,logo,cover,year,rating,url,type,streamId:String(sid||''),id:sid||Math.random()};
  });
}

// ═══════════════════════════════════════════════════
// LOAD SECTIONS
// ═══════════════════════════════════════════════════
function loadLive(){
  getM3U('live', items=>{
    if(!items.length){useDemoLive();return;}
    allItems=items.map((it,i)=>({...it,id:i+1}));
    buildCats();
    renderSide(filtered());
    setNosig('📡','Canlı Yayınlar','Kanal seçin');
  });
}

function loadVod(){
  // API ile kategori + içerik çek
  apiFetch('get_vod_categories','',catData=>{
    const apiCats=Array.isArray(catData)?catData:[];
    apiFetch('get_vod_streams','',vodData=>{
      if(Array.isArray(vodData)&&vodData.length){
        const base=cln(S.url);
        allItems=vodData.map((v,i)=>({
          id:i+1, name:v.name||'Film', group:v.category_id||'',
          logo:v.stream_icon||v.cover||'', cover:v.cover||'',
          year:v.year||'', rating:v.rating||'5.0', plot:v.plot||'',
          url:`${base}/movie/${e(S.user)}/${e(S.pass)}/${v.stream_id}.${v.container_extension||'mp4'}`,
          type:'vod', streamId:String(v.stream_id||'')
        }));
        // Map category names
        apiCats.forEach(c=>{
          allItems.forEach(it=>{ if(it.group===c.category_id) it.groupName=c.category_name; });
        });
        buildCats();
        renderGrid(filtered());
        setNosig('🎬','Filmler','Bir film seçin');
      } else {
        // M3U fallback
        getM3U('vod',items=>{
          if(!items.length){useDemoVod();return;}
          allItems=items.map((it,i)=>({...it,id:i+1}));
          buildCats(); renderGrid(filtered()); setNosig('🎬','Filmler','Bir film seçin');
        });
      }
    });
  });
}

function loadSeries(){
  apiFetch('get_series_categories','',catData=>{
    const apiCats=Array.isArray(catData)?catData:[];
    apiFetch('get_series','',serData=>{
      if(Array.isArray(serData)&&serData.length){
        allItems=serData.map((s,i)=>({
          id:i+1, name:s.name||'Dizi', group:s.category_id||'',
          logo:s.cover||'', cover:s.cover||'',
          year:s.year||'', rating:s.rating||'7.0', plot:s.plot||'',
          url:'', type:'series', streamId:String(s.series_id||''), seriesId:s.series_id
        }));
        apiCats.forEach(c=>{
          allItems.forEach(it=>{ if(it.group===c.category_id) it.groupName=c.category_name; });
        });
        buildCats(); renderGrid(filtered()); setNosig('📺','Diziler','Bir dizi seçin');
      } else {
        getM3U('series',items=>{
          if(!items.length){useDemoSeries();return;}
          allItems=items.map((it,i)=>({...it,id:i+1}));
          buildCats(); renderGrid(filtered()); setNosig('📺','Diziler','Bir dizi seçin');
        });
      }
    });
  });
}

// ═══════════════════════════════════════════════════
// CATEGORIES — otomatik oluştur
// ═══════════════════════════════════════════════════
function buildCats(){
  const seen={};
  cats=[];
  allItems.forEach(it=>{
    const key=it.groupName||it.group||'Diğer';
    if(!seen[key]){ seen[key]=true; cats.push({id:it.group||key,name:key}); }
  });
  // Sort alphabetically
  cats.sort((a,b)=>a.name.localeCompare(b.name,'tr'));
  renderCatPanel();
}

function renderCatPanel(){
  let html=`<div class="cbtn on" onclick="setCat('all',this)">Tümü (${allItems.length})</div>`;
  cats.forEach(c=>{
    const cnt=allItems.filter(it=>it.group===c.id||(it.groupName||it.group)===c.name).length;
    html+=`<div class="cbtn" onclick="setCat('${esc(c.id)}',this)">${c.name} <span style="opacity:.5;font-size:10px">${cnt}</span></div>`;
  });
  id('catpanel').innerHTML=html;
}

// ═══════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════
function filtered(){
  return allItems.filter(it=>{
    const gn=it.groupName||it.group||'';
    const catOk=curCat==='all'||it.group===curCat||gn===curCat;
    const srOk=it.name.toLowerCase().includes(curSrch.toLowerCase());
    return catOk&&srOk;
  });
}
function setCat(cid,btn){
  curCat=cid;
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const f=filtered();
  if(sec==='live') renderSide(f); else renderGrid(f);
}
function doSearch(v){
  curSrch=v;
  const f=filtered();
  if(sec==='live') renderSide(f); else renderGrid(f);
}

// ═══════════════════════════════════════════════════
// RENDER SIDEBAR (live)
// ═══════════════════════════════════════════════════
function renderSide(list){
  const el=id('slist');
  if(!list.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--dim);font-size:13px">Kanal bulunamadı</div>';return;}
  // group by category
  const grps={};
  list.forEach(it=>{
    const g=it.groupName||it.group||'Diğer';
    if(!grps[g]) grps[g]=[];
    grps[g].push(it);
  });
  let html='';
  Object.entries(grps).forEach(([g,chs])=>{
    if(curCat==='all') html+=`<div class="glabel">📂 ${g}</div>`;
    chs.forEach((it,i)=>{
      const logo=it.logo?`<img src="${it.logo}" onerror="this.parentElement.textContent='📺'" loading="lazy">`:'📺';
      html+=`<div class="chitem ${activeId===it.id?'on':''}" onclick="selItem(${it.id})">
        <div class="chlogo">${logo}</div>
        <div class="chinf">
          <div class="chn">${it.name}</div>
          <div class="chm">${g}</div>
        </div>
        <span class="badge bl">CANLI</span>
      </div>`;
    });
  });
  el.innerHTML=html;
}

// ═══════════════════════════════════════════════════
// RENDER GRID (vod/series)
// ═══════════════════════════════════════════════════
function renderGrid(list){
  const el=id('slist');
  if(!list.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--dim);font-size:13px">İçerik bulunamadı</div>';return;}

  // group
  const grps={};
  list.forEach(it=>{
    const g=it.groupName||it.group||'Diğer';
    if(!grps[g]) grps[g]=[];
    grps[g].push(it);
  });

  let html='<div style="padding:8px">';
  Object.entries(grps).forEach(([g,items])=>{
    if(curCat==='all') html+=`<div class="glabel" style="padding:12px 4px 8px">📂 ${g}</div>`;
    html+='<div class="grid">';
    items.forEach(it=>{
      const img=(it.cover||it.logo)?`<img src="${it.cover||it.logo}" onerror="this.parentElement.innerHTML='${it.type==='vod'?'🎬':'📺'}'" loading="lazy">`:(it.type==='vod'?'🎬':'📺');
      html+=`<div class="gcard ${activeId===it.id?'on':''}" onclick="selItem(${it.id})">
        <div class="gthumb">${img}<div class="gplay">▶</div></div>
        <div class="gtitle" title="${it.name}">${it.name}</div>
        <div class="gyear">${it.year||''} ${it.rating?'⭐'+it.rating:''}</div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  el.innerHTML=`<div class="grid-wrap">${html}</div>`;
}

// ═══════════════════════════════════════════════════
// SELECT & PLAY
// ═══════════════════════════════════════════════════
function selItem(iid){
  const it=allItems.find(x=>x.id===iid);
  if(!it) return;
  activeId=iid; activeIdx=allItems.findIndex(x=>x.id===iid);
  if(sec==='live') renderSide(filtered()); else renderGrid(filtered());
  id('ovlN').textContent=it.name;
  id('ovlT').textContent=new Date().toLocaleTimeString('tr-TR');
  id('chnm').textContent='#'+(activeIdx+1);
  if(it.type==='series'){ showInfo(it,'📺'); loadEp(it); return; }
  if(it.type==='vod') showInfo(it,'🎬'); else showEPG(it);
  playUrl(it.url, it.name, it.type==='live'?'📡':'🎬');
}

function playUrl(url, name, ico){
  // Destroy existing HLS instance
  if(hls){ hls.destroy(); hls=null; }

  if(!url){
    setNosig(ico,name,'Stream URL bulunamadı.');
    vp.style.display='none'; id('nosig').style.display='flex';
    playing=false; pbtn.textContent='▶'; return;
  }

  id('nosig').style.display='none';
  vp.style.display='block';

  if(Hls.isSupported() && (url.includes('.m3u8')||url.includes('/live/')||url.includes('/movie/')||url.includes('/series/'))){
    hls=new Hls({enableWorker:false, lowLatencyMode:true});
    hls.loadSource(url);
    hls.attachMedia(vp);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{ vp.play().catch(()=>{}); playing=true; pbtn.textContent='⏸'; });
    hls.on(Hls.Events.ERROR,(_,d)=>{ if(d.fatal){ setNosig(ico,name,'Yayın yüklenemedi. ('+d.details+')'); vp.style.display='none'; id('nosig').style.display='flex'; } });
  } else if(vp.canPlayType('application/vnd.apple.mpegurl')){
    vp.src=url;
    vp.play().then(()=>{playing=true;pbtn.textContent='⏸';}).catch(()=>{
      setNosig(ico,name,'Yayın başlatılamadı.'); vp.style.display='none'; id('nosig').style.display='flex';
    });
  } else {
    vp.src=url;
    vp.play().then(()=>{playing=true;pbtn.textContent='⏸';}).catch(()=>{
      setNosig(ico,name,'Yayın başlatılamadı.'); vp.style.display='none'; id('nosig').style.display='flex';
    });
  }
}

function loadEp(it){
  setNosig('📺',it.name,'Bölümler yükleniyor...');
  apiFetch('get_series_info',`&series_id=${it.seriesId||it.streamId}`,d=>{
    if(d&&d.episodes){
      const seasons=Object.keys(d.episodes);
      const ep=seasons.length?d.episodes[seasons[0]][0]:null;
      if(ep){
        const base=cln(S.url);
        playUrl(`${base}/series/${e(S.user)}/${e(S.pass)}/${ep.id}.${ep.container_extension||'mp4'}`,it.name,'📺');
      } else setNosig('📺',it.name,'Bölüm bulunamadı.');
    } else setNosig('📺',it.name,'Dizi bilgisi alınamadı.');
  });
}

function showEPG(it){
  id('ihead').textContent='📋 Program Rehberi';
  id('isc').innerHTML=`<div class="epgi now">
    <div class="epgt">Şu An <span class="nowbadge">CANLI</span></div>
    <div class="epgtt">${it.name}</div>
    <div class="epgb"><div class="epgbf" style="width:60%"></div></div>
  </div>`;
}

function showInfo(it,ico){
  id('ihead').textContent=ico==='🎬'?'🎬 Film Bilgisi':'📺 Dizi Bilgisi';
  const img=(it.cover||it.logo)?`<img src="${it.cover||it.logo}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover">`:ico;
  id('isc').innerHTML=`<div class="vinfo">
    <div class="vposter">${img}</div>
    <div class="vtitle">${it.name}</div>
    <div class="vmeta">${it.year?'📅 '+it.year+'<br>':''}${it.plot||''}</div>
    ${it.rating?`<div class="vstar">⭐ ${it.rating}/10</div>`:''}
  </div>`;
}

// ═══════════════════════════════════════════════════
// DEMO FALLBACK
// ═══════════════════════════════════════════════════

function useDemoVod(){

  allItems=Array.from({length:30},(_,i)=>({id:i+1,name:'Film '+(i+1),group:String(i%5),groupName:gs[i%5],logo:'',cover:'',year:2018+i%7,rating:(6.5+i*.1).toFixed(1),plot:'',url:'',type:'vod'}));

}
function useDemoSeries(){
  const gs=['Dram','Aksiyon','Komedi','Sci-Fi'];
  allItems=Array.from({length:20},(_,i)=>({id:i+1,name:'Dizi '+(i+1),group:String(i%4),groupName:gs[i%4],logo:'',cover:'',year:2016+i%9,rating:(7+i%.3).toFixed(1),plot:'',url:'',type:'series',seriesId:i+1}));
  buildCats(); renderGrid(filtered()); setNosig('📺','Diziler','Panel bağlantısı kurulamadı — demo mod');
}

// ═══════════════════════════════════════════════════
// API FETCH (Xtream JSON)
// ═══════════════════════════════════════════════════
function apiFetch(action,extra,cb){
  const base=cln(S.url);
  const url=`${base}/player_api.php?username=${e(S.user)}&password=${e(S.pass)}&action=${action}${extra}`;
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),15000);
  fetch(url,{signal:ctrl.signal})
    .then(r=>r.json())
    .then(d=>{clearTimeout(t);cb(d);})
    .catch(err=>{clearTimeout(t);console.warn(action,err.message);cb(null);});
}

// ═══════════════════════════════════════════════════
// PLAYER CONTROLS
// ═══════════════════════════════════════════════════
function tplay(){playing?(vp.pause(),playing=false,pbtn.textContent='▶'):(vp.play().catch(()=>{}),playing=true,pbtn.textContent='⏸');}
function back10(){vp.currentTime-=10;}
function fwd10(){vp.currentTime+=10;}
function prevI(){if(activeIdx>0) selItem(allItems[activeIdx-1].id);}
function nextI(){if(activeIdx<allItems.length-1) selItem(allItems[activeIdx+1].id);}
function tmute(){muted=!muted;vp.muted=muted;id('mbtn').textContent=muted?'🔇':'🔊';}
function svol(v){vp.volume=v/100;}
function seek(ev){if(vp.duration){vp.currentTime=(ev.offsetX/ev.currentTarget.offsetWidth)*vp.duration;}}
function tfs(){!document.fullscreenElement?id('vscr').requestFullscreen?.():document.exitFullscreen?.();}

vp.addEventListener('timeupdate',()=>{
  if(!vp.duration) return;
  id('pf').style.width=(vp.currentTime/vp.duration*100)+'%';
  const f=t=>String(Math.floor(t/60)).padStart(2,'0')+':'+String(Math.floor(t%60)).padStart(2,'0');
  id('tdp').textContent=f(vp.currentTime)+' / '+f(vp.duration);
});
vp.addEventListener('play',()=>{playing=true;pbtn.textContent='⏸';});
vp.addEventListener('pause',()=>{playing=false;pbtn.textContent='▶';});

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function setNosig(ico,ttl,msg){
  id('nosig').style.display='flex'; vp.style.display='none';
  id('nsico').textContent=ico; id('nsttl').textContent=ttl; id('nsmsg').textContent=msg;
}
function cln(u){return (u||'').replace(/\/+$/,'');}
function e(s){return encodeURIComponent(s||'');}
function esc(s){return (s||'').replace(/'/g,"\\'");}
function id(i){return document.getElementById(i);}

// Enter keys
['lU','lP'].forEach(i=>id(i).addEventListener('keydown',ev=>{if(ev.key==='Enter')doLogin();}));
['gUrl','gU','gP'].forEach(i=>id(i).addEventListener('keydown',ev=>{if(ev.key==='Enter')doGuest();}));
</script>
