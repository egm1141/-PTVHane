<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IPTVHane</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
:root {
  --bg:       #080c14;
  --s1:       #0d1525;
  --s2:       #111d30;
  --border:   rgba(255,255,255,0.06);
  --accent:   #6c63ff;
  --accent2:  #ff6584;
  --glow:     rgba(108,99,255,0.25);
  --text:     #f0f4ff;
  --muted:    #5a6a8a;
  --pill:     rgba(108,99,255,0.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 100% 60% at 0% 0%,   rgba(108,99,255,0.12) 0%,transparent 55%),
    radial-gradient(ellipse 80%  70% at 100% 100%,rgba(255,101,132,0.08) 0%,transparent 55%),
    radial-gradient(ellipse 60%  50% at 50% 50%,  rgba(108,99,255,0.04) 0%,transparent 60%);
  pointer-events:none;
  animation: meshAnim 12s ease-in-out infinite alternate;
}

@keyframes meshAnim {
  from { opacity:.8; }
  to   { opacity:1;  }
}

/* ═══════════════════════════════════
   LOGIN
═══════════════════════════════════ */
#loginScreen {
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}

.login-wrap {
  position:relative;z-index:1;
  width:100%;max-width:420px;
  animation: popIn .6s cubic-bezier(.16,1,.3,1);
}

@keyframes popIn {
  from{opacity:0;transform:scale(.92) translateY(20px)}
  to  {opacity:1;transform:scale(1)   translateY(0)}
}

.login-head {
  text-align:center;
  margin-bottom:36px;
}

.logo-mark {
  display:inline-flex;
  align-items:center;justify-content:center;
  width:64px;height:64px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:20px;
  font-size:28px;
  margin-bottom:16px;
  box-shadow:0 0 40px var(--glow);
}

.login-head h1 {
  font-family:'Syne',sans-serif;
  font-size:28px;font-weight:800;
  letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.login-head p { color:var(--muted);font-size:14px;margin-top:4px; }

.glass-card {
  background:rgba(13,21,37,0.8);
  border:1px solid var(--border);
  border-radius:24px;
  padding:36px;
  backdrop-filter:blur(20px);
  box-shadow:0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}

/* Fields */
.f-group { margin-bottom:18px; }

.f-group label {
  display:block;font-size:11px;font-weight:600;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:8px;
}

.f-group input {
  width:100%;padding:13px 16px;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;
  transition:all .2s;
}

.f-group input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(108,99,255,0.15);
}

.f-group input::placeholder{color:var(--muted)}

.btn-login {
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent) 0%,rgba(108,99,255,0.8) 100%);
  border:none;border-radius:14px;
  color:#fff;font-size:15px;font-weight:600;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;margin-top:8px;
  transition:all .2s;
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px var(--glow);
}

.btn-login::before {
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  opacity:0;transition:opacity .2s;
}

.btn-login:hover{transform:translateY(-2px);box-shadow:0 16px 48px var(--glow)}
.btn-login:hover::before{opacity:1}
.btn-login:active{transform:translateY(0)}

.err-msg {
  color:var(--accent2);font-size:13px;
  text-align:center;margin-top:14px;
  display:none;padding:10px;
  background:rgba(255,101,132,0.1);
  border-radius:10px;
  border:1px solid rgba(255,101,132,0.2);
}

/* ═══════════════════════════════════
   MAIN
═══════════════════════════════════ */
#mainScreen {
  display:none;flex-direction:column;
  min-height:100vh;
  position:relative;z-index:1;
}

.app-layout {
  display:flex;flex:1;
}

/* Sidebar */
.sidebar {
  width:220px;flex-shrink:0;
  background:var(--s1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:20px 12px;
  position:sticky;top:0;height:100vh;
  overflow-y:auto;
}

.sidebar-logo {
  font-family:'Syne',sans-serif;
  font-size:17px;font-weight:800;
  padding:8px 10px 20px;
  border-bottom:1px solid var(--border);
  margin-bottom:20px;
}

.sidebar-logo span {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.sidebar-logo small {
  display:block;font-size:11px;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-weight:400;
  margin-top:2px;
}

.nav-label {
  font-size:10px;color:var(--muted);font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
  padding:0 10px;margin-bottom:8px;
}

.nav-btn {
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;
  border:none;border-radius:12px;
  background:transparent;
  color:var(--muted);
  font-size:14px;font-family:'DM Sans',sans-serif;
  cursor:pointer;width:100%;text-align:left;
  transition:all .2s;margin-bottom:4px;
}

.nav-btn:hover{background:var(--s2);color:var(--text)}

.nav-btn.active{
  background:var(--pill);
  color:var(--accent);
  font-weight:500;
}

.nav-icon{font-size:18px;flex-shrink:0}

.sidebar-bottom{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}

.btn-logout {
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border:1px solid rgba(255,101,132,0.2);
  border-radius:12px;
  background:rgba(255,101,132,0.05);
  color:var(--accent2);
  font-size:13px;font-family:'DM Sans',sans-serif;
  cursor:pointer;width:100%;
  transition:all .2s;
}

.btn-logout:hover{background:rgba(255,101,132,0.15);border-color:var(--accent2)}

.main-area {
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;
}

.topbar {
  padding:16px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
  background:rgba(8,12,20,0.6);
  backdrop-filter:blur(10px);
  position:relative;
  z-index:100;
}

.topbar-title {
  font-family:'Syne',sans-serif;
  font-size:20px;font-weight:700;
  flex:1;
}

/* Search */
.search-wrap {
  position:relative;
  display:flex;align-items:center;
}

.search-input {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-size:13px;font-family:'DM Sans',sans-serif;
  padding:9px 38px 9px 14px;
  outline:none;
  width:220px;
  transition:all .25s;
}

.search-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(108,99,255,0.15);
  width:280px;
}

.search-input::placeholder{color:var(--muted)}

.search-icon {
  position:absolute;right:12px;
  font-size:14px;color:var(--muted);
  pointer-events:none;
}

.search-clear {
  position:absolute;right:10px;
  background:none;border:none;
  color:var(--muted);font-size:16px;
  cursor:pointer;line-height:1;
  padding:2px;
  display:none;
}
.search-clear:hover{color:var(--text)}

/* Search results panel */
#searchResults {
  display:none;
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  width:360px;max-height:480px;overflow-y:auto;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:0 24px 60px rgba(0,0,0,0.8);
  z-index:9999;
}

.sr-section { padding:10px 0; }

.sr-label {
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;
  padding:4px 16px 8px;
}

.sr-item {
  display:flex;align-items:center;gap:12px;
  padding:9px 16px;cursor:pointer;
  transition:background .15s;
}
.sr-item:hover{background:var(--s2)}

.sr-thumb {
  width:36px;height:36px;border-radius:8px;
  background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;overflow:hidden;
}
.sr-thumb img{width:100%;height:100%;object-fit:contain;border-radius:8px}

.sr-info{flex:1;min-width:0}
.sr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-cat{font-size:11px;color:var(--muted);margin-top:2px}

.sr-type {
  font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:5px;
  flex-shrink:0;
}
.sr-type.live{background:rgba(34,197,94,0.15);color:#22c55e}
.sr-type.movie{background:rgba(108,99,255,0.15);color:var(--accent)}
.sr-type.series{background:rgba(255,101,132,0.15);color:var(--accent2)}

.sr-empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}
.sr-divider{height:1px;background:var(--border);margin:0 16px}

.topbar-user {
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--muted);
}

.user-dot {
  width:8px;height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 8px #22c55e;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.5}
}

.breadbar {
  padding:10px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  background:var(--s1);
  font-size:13px;color:var(--muted);
}

.bc-back {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  padding:5px 14px;
  font-size:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  display:none;
  transition:all .2s;
}

.bc-back.visible{display:block}
.bc-back:hover{border-color:var(--accent);color:var(--accent)}

.content-scroll{flex:1;overflow-y:auto;padding:24px}

/* ── CATEGORY GRID ── */
.cat-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}

.cat-card {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px 16px;
  text-align:center;
  cursor:pointer;
  transition:all .22s;
  animation:fadeUp .3s ease both;
  position:relative;overflow:hidden;
}

.cat-card::before {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(108,99,255,0.08),rgba(255,101,132,0.04));
  opacity:0;transition:opacity .2s;
}

.cat-card:hover{
  border-color:rgba(108,99,255,0.4);
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(0,0,0,0.3);
}

.cat-card:hover::before{opacity:1}

.cat-emoji{font-size:32px;margin-bottom:10px;display:block}
.cat-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.cat-count{font-size:11px;color:var(--muted);margin-top:5px}

/* ── CHANNEL LIST ── */
.ch-list{display:flex;flex-direction:column;gap:8px}

.ch-item {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 18px;
  display:flex;align-items:center;gap:16px;
  cursor:pointer;
  transition:all .18s;
  animation:fadeUp .25s ease both;
}

.ch-item:hover{
  border-color:rgba(108,99,255,0.35);
  background:rgba(108,99,255,0.06);
  transform:translateX(5px);
}

.ch-logo{
  width:48px;height:48px;border-radius:10px;
  background:var(--s1);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;overflow:hidden;
}

.ch-logo img{width:100%;height:100%;object-fit:contain;border-radius:10px}

.ch-info{flex:1;min-width:0}
.ch-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-cat{font-size:12px;color:var(--muted);margin-top:3px}

.ch-play{
  width:36px;height:36px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),rgba(108,99,255,0.6));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;flex-shrink:0;
  box-shadow:0 4px 16px var(--glow);
  transition:transform .2s;
}

.ch-item:hover .ch-play{transform:scale(1.1)}

/* ── MEDIA GRID ── */
.media-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:14px;
}

.media-card {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:all .2s;
  animation:fadeUp .3s ease both;
}

.media-card:hover{
  border-color:rgba(108,99,255,0.4);
  transform:translateY(-4px);
  box-shadow:0 20px 48px rgba(0,0,0,0.4);
}

.media-poster{
  width:100%;aspect-ratio:2/3;
  background:var(--s1);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;color:var(--muted);
  overflow:hidden;position:relative;
}

.media-poster img{width:100%;height:100%;object-fit:cover}

.media-overlay {
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(8,12,20,.9) 0%,transparent 50%);
  opacity:0;transition:opacity .2s;
  display:flex;align-items:flex-end;padding:12px;
}

.media-card:hover .media-overlay{opacity:1}

.play-badge {
  background:var(--accent);
  color:#fff;font-size:12px;
  padding:4px 10px;border-radius:6px;
  font-weight:600;
}

.media-body{padding:10px 12px 12px}
.media-title{font-size:12px;font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.media-sub{font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to  {opacity:1;transform:translateY(0)}
}

.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:80px}
.spinner{
  width:44px;height:44px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:60px;color:var(--muted);font-size:15px}

/* ── PLAYER MODAL ── */
#playerModal {
  position:fixed;inset:0;z-index:200;
  background:#000;
  display:none;flex-direction:column;
}
#playerModal.open{display:flex}

.pbar {
  padding:12px 20px;
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent);
  position:absolute;top:0;left:0;right:0;z-index:10;
  transition:opacity .3s;
}

#playerModal.hide-ui .pbar { opacity:0;pointer-events:none; }
#playerModal.hide-ui .player-controls { opacity:0;pointer-events:none; }

.p-title{flex:1;font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}

.p-close {
  background:rgba(255,101,132,0.2);
  border:1px solid rgba(255,101,132,0.4);
  border-radius:10px;color:var(--accent2);
  padding:7px 18px;font-size:13px;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;
}
.p-close:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}

#videoPlayer{
  position:absolute;inset:0;
  width:100%;height:100%;
  background:#000;display:block;
  cursor:pointer;
}

/* ── CUSTOM CONTROLS ── */
.player-controls {
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.5) 60%,transparent 100%);
  padding:32px 20px 16px;
  transition:opacity .3s;
}

/* Progress bar */
.progress-wrap {
  position:relative;height:4px;
  background:rgba(255,255,255,0.2);
  border-radius:2px;cursor:pointer;
  margin-bottom:14px;
  transition:height .15s;
}
.progress-wrap:hover { height:6px; }

.progress-buf {
  position:absolute;left:0;top:0;height:100%;
  background:rgba(255,255,255,0.25);border-radius:2px;
  pointer-events:none;
}
.progress-fill {
  position:absolute;left:0;top:0;height:100%;
  background:linear-gradient(90deg,var(--accent),#a78bfa);
  border-radius:2px;pointer-events:none;
  transition:width .1s linear;
}
.progress-thumb {
  position:absolute;top:50%;
  width:14px;height:14px;
  background:#fff;border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  transition:transform .15s;
  pointer-events:none;
  box-shadow:0 0 6px rgba(0,0,0,0.6);
}
.progress-wrap:hover .progress-thumb { transform:translate(-50%,-50%) scale(1); }

/* Time tooltip */
.progress-tooltip {
  position:absolute;bottom:18px;
  background:rgba(0,0,0,0.85);color:#fff;
  font-size:11px;padding:3px 7px;border-radius:5px;
  pointer-events:none;transform:translateX(-50%);
  display:none;white-space:nowrap;
}
.progress-wrap:hover .progress-tooltip { display:block; }

/* Controls row */
.ctrl-row {
  display:flex;align-items:center;gap:12px;
}

.ctrl-btn {
  background:none;border:none;color:#fff;
  cursor:pointer;padding:6px;border-radius:8px;
  font-size:20px;line-height:1;
  transition:background .15s,transform .1s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.ctrl-btn:hover{background:rgba(255,255,255,0.12);transform:scale(1.1)}
.ctrl-btn:active{transform:scale(.95)}

.ctrl-btn.skip { font-size:15px; }

/* Volume */
.vol-wrap { display:flex;align-items:center;gap:8px; }
.vol-slider {
  -webkit-appearance:none;appearance:none;
  width:80px;height:4px;
  background:rgba(255,255,255,0.25);
  border-radius:2px;outline:none;cursor:pointer;
  transition:width .2s;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:12px;height:12px;
  border-radius:50%;background:#fff;cursor:pointer;
}
.vol-wrap:hover .vol-slider { width:90px; }

/* Time display */
.time-display {
  font-size:13px;color:rgba(255,255,255,0.85);
  font-variant-numeric:tabular-nums;
  letter-spacing:.3px;white-space:nowrap;
}

.ctrl-spacer{flex:1}

/* Fullscreen */
.live-badge {
  font-size:11px;font-weight:700;
  background:var(--accent2);color:#fff;
  padding:3px 8px;border-radius:5px;letter-spacing:.5px;
  display:none;
}
.live-badge.visible{display:inline-block}

.p-note{
  display:none;
}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s2);border-radius:3px}

@media(max-width:700px){
  .sidebar{display:none}
  .cat-grid{grid-template-columns:repeat(2,1fr)}
  .media-grid{grid-template-columns:repeat(2,1fr)}
  .content-scroll{padding:14px}
  .topbar{padding:12px 16px;flex-wrap:wrap;gap:10px}
  .breadbar{padding:8px 16px}
  .search-input{width:160px}
  .search-input:focus{width:190px}
  #searchResults{width:calc(100vw - 32px);right:16px;left:auto}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-head">
      <div class="logo-mark">📺</div>
      <h1>IPTVHane</h1>
      <p>v2.1 — Sınırsız İçerik Deneyimi</p>
    </div>

    <div class="glass-card">
      <div class="f-group">
        <label>Sunucu URL</label>
        <input id="cUrl" type="url" placeholder="http://sunucu.com:8080"/>
      </div>
      <div class="f-group">
        <label>Kullanıcı Adı</label>
        <input id="cUser" type="text" placeholder="kullanıcı adı" autocomplete="username"/>
      </div>
      <div class="f-group">
        <label>Şifre</label>
        <input id="cPass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-login" onclick="loginCustomer()">Giriş Yap →</button>
      <div class="err-msg" id="loginError"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span>IPTVHane</span>
        <small id="sideUser">—</small>
      </div>

      <div class="nav-label">İçerik</div>
      <button class="nav-btn active" onclick="switchTab('live',this)">
        <span class="nav-icon">📡</span> Canlı TV
      </button>
      <button class="nav-btn" onclick="switchTab('movies',this)">
        <span class="nav-icon">🎬</span> Filmler
      </button>
      <button class="nav-btn" onclick="switchTab('series',this)">
        <span class="nav-icon">🎞</span> Diziler
      </button>

      <div class="sidebar-bottom">
        <button class="btn-logout" onclick="logout()">
          <span>⏻</span> Çıkış Yap
        </button>
      </div>
    </aside>

    <!-- Main area -->
    <div class="main-area">
      <div class="topbar">
        <div class="topbar-title" id="topTitle">Canlı TV</div>

        <!-- Search -->
        <div class="search-wrap" id="searchWrap">
          <input class="search-input" id="searchInput" type="text"
                 placeholder="🔍  Kanal, film, dizi ara..."
                 oninput="onSearch(this.value)"
                 onkeydown="if(event.key==='Escape'){clearSearch()}"
                 autocomplete="off"/>
          <span class="search-icon" id="searchIcon">🔍</span>
          <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
          <div id="searchResults"></div>
        </div>

        <div class="topbar-user">
          <div class="user-dot"></div>
          <span id="topUser"></span>
        </div>
      </div>

      <div class="breadbar">
        <button class="bc-back" id="backBtn" onclick="goBack()">← Geri</button>
        <span id="filterInfo">Kategori seçin</span>
      </div>

      <div class="content-scroll" id="content">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="playerModal">
  <!-- Top bar -->
  <div class="pbar">
    <button class="p-close" onclick="closePlayer()">✕ Kapat</button>
    <div class="p-title" id="playerTitle"></div>
    <span class="live-badge" id="liveBadge">🔴 CANLI</span>
  </div>

  <!-- Video -->
  <video id="videoPlayer" autoplay onclick="togglePlay()"></video>

  <!-- Error -->
  <div id="playerError" style="display:none;position:absolute;bottom:90px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 20px;font-size:13px;color:var(--accent2);background:rgba(0,0,0,0.7);border-radius:10px;border:1px solid rgba(255,101,132,0.3);z-index:20;white-space:nowrap;"></div>

  <!-- Custom Controls -->
  <div class="player-controls" id="playerControls">

    <!-- Progress bar -->
    <div class="progress-wrap" id="progressWrap"
         onmousedown="seekStart(event)"
         onmousemove="seekHover(event)"
         onmouseleave="seekLeave()">
      <div class="progress-buf"  id="progressBuf"></div>
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-thumb" id="progressThumb"></div>
      <div class="progress-tooltip" id="progressTooltip"></div>
    </div>

    <!-- Buttons row -->
    <div class="ctrl-row">
      <!-- Play/Pause -->
      <button class="ctrl-btn" id="playBtn" onclick="togglePlay()" title="Oynat/Duraklat">▶</button>

      <!-- Skip back 10s -->
      <button class="ctrl-btn skip" onclick="skipBy(-10)" title="10 saniye geri">⏮ 10</button>

      <!-- Skip forward 10s -->
      <button class="ctrl-btn skip" onclick="skipBy(10)" title="10 saniye ileri">10 ⏭</button>

      <!-- Volume -->
      <div class="vol-wrap">
        <button class="ctrl-btn" id="volBtn" onclick="toggleMute()" title="Ses">🔊</button>
        <input class="vol-slider" id="volSlider" type="range" min="0" max="1" step="0.02" value="1"
               oninput="setVolume(this.value)"/>
      </div>

      <!-- Time -->
      <span class="time-display" id="timeDisplay">0:00 / 0:00</span>

      <div class="ctrl-spacer"></div>

      <!-- Fullscreen -->
      <button class="ctrl-btn" onclick="toggleFullscreen()" title="Tam Ekran">⛶</button>
    </div>
  </div>
</div>

<script>
let serverUrl='', username='', password='';
let allChannels=[], allMovies=[], allSeries=[];
let currentTab='live', selectedCat=null;

// ── Login ──────────────────────────────────────────────────────
async function loginCustomer() {
  let url = val('cUrl').replace(/\/$/, '');
  const u = val('cUser'), p = val('cPass');
  if (!url||!u||!p) return showErr('Tüm alanları doldurunuz.');
  if (!url.startsWith('http')) url = 'http://' + url;

  const btn = document.querySelector('.btn-login');
  btn.textContent = 'Bağlanıyor...';
  btn.style.opacity = '0.7';
  btn.style.pointerEvents = 'none';
  document.getElementById('loginError').style.display = 'none';

  try {
    const res  = await fetch(`${url}/player_api.php?username=${u}&password=${p}`);
    const data = await res.json();
    if ((data?.user_info?.status||'').toLowerCase() === 'active') {
      serverUrl=url; username=u; password=p;
      document.getElementById('topUser').textContent = u;
      document.getElementById('sideUser').textContent = u;
      showMain();
    } else {
      showErr('Giriş başarısız. Bilgileri kontrol edin.');
    }
  } catch(e) {
    showErr('Sunucuya ulaşılamadı. URL\'yi kontrol edin.');
  }

  btn.textContent = 'Giriş Yap →';
  btn.style.opacity = '';
  btn.style.pointerEvents = '';
}

function showErr(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}

function logout() {
  serverUrl=username=password='';
  allChannels=allMovies=allSeries=[];
  selectedCat=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainScreen').style.display='none';
}

// ── Main ───────────────────────────────────────────────────────
async function showMain() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainScreen').style.display='flex';
  setContent('<div class="spinner-wrap"><div class="spinner"></div></div>');
  setFilter('Yükleniyor...');

  try {
    const [ch,mv,sr,lc,mc,sc] = await Promise.all([
      api('get_live_streams'), api('get_vod_streams'), api('get_series'),
      api('get_live_categories'), api('get_vod_categories'), api('get_series_categories')
    ]);

    const lm=catMap(lc), mm=catMap(mc), sm=catMap(sc);

// Adult içerik filtresi
function isAdult(name) {
  const n = String(name||'').toLowerCase();
  return /adult|18\+|xxx|sex|porn|erotic|erotik|yetişkin|mature|x-rated|playboy|brazzers|hustler|naughty|milf|anal|cock|pussy|nude|naked|hentai|trans|shemale|fetish/.test(n);
}

    allChannels = (ch||[]).map(x=>({
      id:x.stream_id, name:x.name, logo:x.stream_icon,
      url:`${serverUrl}/live/${username}/${password}/${x.stream_id}.m3u8`,
      cat: lm[x.category_id]||x.category_name||'Genel'
    })).filter(x => !isAdult(x.cat) && !isAdult(x.name));

    allMovies = (mv||[]).map(x=>({
      id:x.stream_id, name:x.name, poster:x.stream_icon,
      url:`${serverUrl}/movie/${username}/${password}/${x.stream_id}.${x.container_extension||'mp4'}`,
      cat: mm[x.category_id]||x.category_name||'Genel'
    })).filter(x => !isAdult(x.cat) && !isAdult(x.name));

    allSeries = (sr||[]).map(x=>({
      id:x.series_id, name:x.name, poster:x.cover,
      cat: sm[x.category_id]||x.category_name||'Genel'
    })).filter(x => !isAdult(x.cat) && !isAdult(x.name));

    render();
  } catch(e) {
    setContent('<div class="empty">İçerik yüklenemedi.</div>');
  }
}

function api(action) {
  return fetch(`${serverUrl}/player_api.php?username=${username}&password=${password}&action=${action}`).then(r=>r.json());
}

function catMap(arr) {
  const m={};(arr||[]).forEach(x=>{if(x.category_id)m[x.category_id]=x.category_name});return m;
}

// ── Search ─────────────────────────────────────────────────────
let searchTimer = null;

function onSearch(q) {
  const clear = document.getElementById('searchClear');
  const icon  = document.getElementById('searchIcon');
  const panel = document.getElementById('searchResults');

  q = q.trim();
  clear.style.display = q ? 'block' : 'none';
  icon.style.display  = q ? 'none'  : 'block';

  clearTimeout(searchTimer);

  if (!q) { panel.style.display = 'none'; return; }

  searchTimer = setTimeout(() => renderSearch(q), 180);
}

function renderSearch(q) {
  const panel = document.getElementById('searchResults');
  const lq = q.toLowerCase();
  const match = x => x.name.toLowerCase().includes(lq) || x.cat.toLowerCase().includes(lq);

  const chHits = allChannels.filter(match).slice(0, 8);
  const mvHits = allMovies.filter(match).slice(0, 8);
  const srHits = allSeries.filter(match).slice(0, 8);
  const total  = chHits.length + mvHits.length + srHits.length;

  if (!total) {
    panel.innerHTML = '<div class="sr-empty">🔍 Sonuç bulunamadı</div>';
    panel.style.display = 'block';
    return;
  }

  let html = '';

  if (chHits.length) {
    html += `<div class="sr-section">
      <div class="sr-label">📡 Canlı TV (${chHits.length})</div>
      ${chHits.map(c => `
        <div class="sr-item" onclick="playStream('${esc(c.url)}','${esc(c.name)}');clearSearch()">
          <div class="sr-thumb">
            ${c.logo ? `<img src="${esc(c.logo)}" onerror="this.parentElement.textContent='📺'" alt="">` : '📺'}
          </div>
          <div class="sr-info">
            <div class="sr-name">${highlight(c.name, q)}</div>
            <div class="sr-cat">${esc(c.cat)}</div>
          </div>
          <span class="sr-type live">CANLI</span>
        </div>`).join('')}
    </div>`;
    if (mvHits.length || srHits.length) html += '<div class="sr-divider"></div>';
  }

  if (mvHits.length) {
    html += `<div class="sr-section">
      <div class="sr-label">🎬 Filmler (${mvHits.length})</div>
      ${mvHits.map(m => `
        <div class="sr-item" onclick="playStream('${esc(m.url)}','${esc(m.name)}');clearSearch()">
          <div class="sr-thumb">
            ${m.poster ? `<img src="${esc(m.poster)}" onerror="this.parentElement.textContent='🎬'" alt="">` : '🎬'}
          </div>
          <div class="sr-info">
            <div class="sr-name">${highlight(m.name, q)}</div>
            <div class="sr-cat">${esc(m.cat)}</div>
          </div>
          <span class="sr-type movie">FİLM</span>
        </div>`).join('')}
    </div>`;
    if (srHits.length) html += '<div class="sr-divider"></div>';
  }

  if (srHits.length) {
    html += `<div class="sr-section">
      <div class="sr-label">🎞 Diziler (${srHits.length})</div>
      ${srHits.map(s => `
        <div class="sr-item" onclick="clearSearch()">
          <div class="sr-thumb">
            ${s.poster ? `<img src="${esc(s.poster)}" onerror="this.parentElement.textContent='🎞'" alt="">` : '🎞'}
          </div>
          <div class="sr-info">
            <div class="sr-name">${highlight(s.name, q)}</div>
            <div class="sr-cat">${esc(s.cat)}</div>
          </div>
          <span class="sr-type series">DİZİ</span>
        </div>`).join('')}
    </div>`;
  }

  panel.innerHTML = html;
  panel.style.display = 'block';
}

function highlight(text, q) {
  const safe = esc(text);
  const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp(`(${safeQ})`, 'gi'),
    '<span style="color:var(--accent);font-weight:700">$1</span>');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchIcon').style.display = 'block';
}

// Dışarı tıklanınca kapat
document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap')?.contains(e.target)) clearSearch();
});

// ── Tab / Nav ──────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentTab=tab; selectedCat=null;
  const titles={live:'Canlı TV', movies:'Filmler', series:'Diziler'};
  document.getElementById('topTitle').textContent = titles[tab];
  render();
}

function goBack() { selectedCat=null; render(); }

function render() {
  document.getElementById('backBtn').classList.toggle('visible', !!selectedCat);

  if (currentTab==='live') {
    selectedCat ? renderChannels(selectedCat) : renderCats(allChannels, 'kanal', '📡');
  } else if (currentTab==='movies') {
    selectedCat ? renderMovies(selectedCat) : renderCats(allMovies, 'film', '🎬');
  } else {
    selectedCat ? renderSeriesItems(selectedCat) : renderCats(allSeries, 'dizi', '🎞');
  }
}

// ── Category screens ───────────────────────────────────────────
function renderCats(data, unit, emoji) {
  const cats = [...new Set(data.map(x=>x.cat))].sort();
  const all  = ['Tümü', ...cats];
  setFilter(`${emoji} Kategori Seç  •  ${cats.length} kategori`);
  setContent(`<div class="cat-grid">${all.map((c,i)=>{
    const count = c==='Tümü' ? data.length : data.filter(x=>x.cat===c).length;
    return `<div class="cat-card" style="animation-delay:${i*.03}s" onclick="selectCat('${esc(c)}')">
      <span class="cat-emoji">${catIcon(c)}</span>
      <div class="cat-name">${esc(c)}</div>
      <div class="cat-count">${count} ${unit}</div>
    </div>`;
  }).join('')}</div>`);
}

function selectCat(cat) { selectedCat=cat; render(); }

// ── Content screens ────────────────────────────────────────────
function renderChannels(cat) {
  const list = cat==='Tümü' ? allChannels : allChannels.filter(c=>c.cat===cat);
  setFilter(`📡 ${cat}  •  ${list.length} kanal`);
  if (!list.length) { setContent('<div class="empty">Kanal bulunamadı.</div>'); return; }
  setContent(`<div class="ch-list">${list.map((c,i)=>`
    <div class="ch-item" style="animation-delay:${i*.018}s" onclick="playStream('${esc(c.url)}','${esc(c.name)}')">
      <div class="ch-logo">
        ${c.logo?`<img src="${esc(c.logo)}" onerror="this.parentElement.textContent='📺'" alt="">`:'📺'}
      </div>
      <div class="ch-info">
        <div class="ch-name">${esc(c.name)}</div>
        <div class="ch-cat">${esc(c.cat)}</div>
      </div>
      <div class="ch-play">▶</div>
    </div>`).join('')}</div>`);
}

function renderMovies(cat) {
  let list = cat==='Tümü' ? allMovies : allMovies.filter(m=>m.cat===cat);
  list = list.sort((a,b)=>(yr(b.name)||0)-(yr(a.name)||0));
  setFilter(`🎬 ${cat}  •  ${list.length} film`);
  if (!list.length) { setContent('<div class="empty">Film bulunamadı.</div>'); return; }
  setContent(`<div class="media-grid">${list.map((m,i)=>`
    <div class="media-card" style="animation-delay:${i*.015}s" onclick="playStream('${esc(m.url)}','${esc(m.name)}')">
      <div class="media-poster">
        ${m.poster?`<img src="${esc(m.poster)}" onerror="this.style.display='none'" loading="lazy" alt="">`:'🎬'}
        <div class="media-overlay"><span class="play-badge">▶ Oynat</span></div>
      </div>
      <div class="media-body">
        <div class="media-title">${esc(m.name)}</div>
        <div class="media-sub">${esc(m.cat)}</div>
      </div>
    </div>`).join('')}</div>`);
}

function renderSeriesItems(cat) {
  let list = cat==='Tümü' ? allSeries : allSeries.filter(s=>s.cat===cat);
  list = list.sort((a,b)=>(yr(b.name)||0)-(yr(a.name)||0));
  setFilter(`🎞 ${cat}  •  ${list.length} dizi`);
  if (!list.length) { setContent('<div class="empty">Dizi bulunamadı.</div>'); return; }
  setContent(`<div class="media-grid">${list.map((s,i)=>`
    <div class="media-card" style="animation-delay:${i*.015}s">
      <div class="media-poster">
        ${s.poster?`<img src="${esc(s.poster)}" onerror="this.style.display='none'" loading="lazy" alt="">`:'🎞'}
        <div class="media-overlay"><span class="play-badge">Detay</span></div>
      </div>
      <div class="media-body">
        <div class="media-title">${esc(s.name)}</div>
        <div class="media-sub">${esc(s.cat)}</div>
      </div>
    </div>`).join('')}</div>`);
}

// ── Player ─────────────────────────────────────────────────────
let hlsInstance = null;
let uiHideTimer = null;
let isSeeking = false;
let isLive = false;

function playStream(url, title) {
  document.getElementById('playerTitle').textContent = title;
  const v = document.getElementById('videoPlayer');

  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  v.removeAttribute('src'); v.load();

  document.getElementById('playerError').style.display = 'none';
  document.getElementById('playerModal').classList.add('open');

  isLive = /\/live\//i.test(url) && /\.m3u8/i.test(url);
  document.getElementById('liveBadge').classList.toggle('visible', isLive);
  document.getElementById('progressWrap').style.opacity = isLive ? '0.4' : '1';
  document.getElementById('progressWrap').style.pointerEvents = isLive ? 'none' : 'auto';

  const isHLS = /\.m3u8/i.test(url) || /\/live\//i.test(url);

  if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
    hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 60 });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(v);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(()=>{}));
    hlsInstance.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) showPlayerError('Yayın yüklenemedi: ' + (data.details||'Hata'));
    });
  } else if (isHLS && v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = url; v.load(); v.play().catch(()=>{});
  } else {
    v.src = url; v.load(); v.play().catch(()=>{});
  }

  resetUiTimer();
}

function showPlayerError(msg) {
  const el = document.getElementById('playerError');
  el.textContent = '⚠️ ' + msg; el.style.display = 'block';
}

function closePlayer() {
  const v = document.getElementById('videoPlayer');
  v.pause(); v.removeAttribute('src'); v.load();
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  document.getElementById('playerModal').classList.remove('open');
  document.getElementById('playerError').style.display = 'none';
  clearTimeout(uiHideTimer);
}

// ── Playback controls ──────────────────────────────────────────
function togglePlay() {
  const v = document.getElementById('videoPlayer');
  if (v.paused) v.play().catch(()=>{}); else v.pause();
  resetUiTimer();
}

function skipBy(sec) {
  const v = document.getElementById('videoPlayer');
  if (!isFinite(v.duration)) return;
  v.currentTime = Math.max(0, Math.min(v.duration, v.currentTime + sec));
  resetUiTimer();
}

function toggleMute() {
  const v = document.getElementById('videoPlayer');
  v.muted = !v.muted;
  document.getElementById('volSlider').value = v.muted ? 0 : v.volume;
  updateVolIcon();
}

function setVolume(val) {
  const v = document.getElementById('videoPlayer');
  v.volume = val; v.muted = (val == 0);
  updateVolIcon();
}

function updateVolIcon() {
  const v = document.getElementById('videoPlayer');
  const btn = document.getElementById('volBtn');
  const vol = v.muted ? 0 : v.volume;
  btn.textContent = vol === 0 ? '🔇' : vol < 0.5 ? '🔉' : '🔊';
}

function toggleFullscreen() {
  const m = document.getElementById('playerModal');
  if (!document.fullscreenElement) m.requestFullscreen?.();
  else document.exitFullscreen?.();
}

// ── Progress bar ───────────────────────────────────────────────
function seekStart(e) {
  if (isLive) return;
  isSeeking = true;
  doSeek(e);
  document.addEventListener('mousemove', onSeekMove);
  document.addEventListener('mouseup', onSeekUp);
}

function onSeekMove(e) { if(isSeeking) doSeek(e); }
function onSeekUp()    { isSeeking=false; document.removeEventListener('mousemove',onSeekMove); document.removeEventListener('mouseup',onSeekUp); }

function doSeek(e) {
  const wrap = document.getElementById('progressWrap');
  const rect = wrap.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const v = document.getElementById('videoPlayer');
  if (isFinite(v.duration)) v.currentTime = pct * v.duration;
}

function seekHover(e) {
  if (isLive) return;
  const wrap = document.getElementById('progressWrap');
  const rect = wrap.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const v = document.getElementById('videoPlayer');
  const tip = document.getElementById('progressTooltip');
  if (isFinite(v.duration)) {
    tip.textContent = fmtTime(pct * v.duration);
    tip.style.left = (pct * 100) + '%';
    document.getElementById('progressThumb').style.left = (pct * 100) + '%';
  }
}
function seekLeave() {}

// ── UI update loop ─────────────────────────────────────────────
const videoEl = () => document.getElementById('videoPlayer');

setInterval(() => {
  const v = videoEl();
  if (!v || !document.getElementById('playerModal').classList.contains('open')) return;

  // Play button icon
  document.getElementById('playBtn').textContent = v.paused ? '▶' : '⏸';

  // Progress
  if (!isSeeking && isFinite(v.duration) && v.duration > 0) {
    const pct = v.currentTime / v.duration * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressThumb').style.left = pct + '%';
  }

  // Buffer
  if (v.buffered.length > 0 && isFinite(v.duration) && v.duration > 0) {
    const buf = v.buffered.end(v.buffered.length - 1) / v.duration * 100;
    document.getElementById('progressBuf').style.width = buf + '%';
  }

  // Time
  document.getElementById('timeDisplay').textContent =
    isLive ? '🔴 Canlı' :
    isFinite(v.duration) ? fmtTime(v.currentTime) + ' / ' + fmtTime(v.duration) : '...';

}, 250);

// ── Auto-hide UI ───────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  if (!document.getElementById('playerModal').classList.contains('open')) return;
  document.getElementById('playerModal').classList.remove('hide-ui');
  resetUiTimer();
});

function resetUiTimer() {
  clearTimeout(uiHideTimer);
  uiHideTimer = setTimeout(() => {
    const v = videoEl();
    if (v && !v.paused) document.getElementById('playerModal').classList.add('hide-ui');
  }, 3000);
}

// ── Helpers ────────────────────────────────────────────────────
function fmtTime(s) {
  if (!isFinite(s)) return '0:00';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${m}:${String(sec).padStart(2,'0')}`;
}

// ── Helpers ────────────────────────────────────────────────────
function setContent(h) { document.getElementById('content').innerHTML=h; }
function setFilter(t)  { document.getElementById('filterInfo').textContent=t; }
function val(id)       { return document.getElementById(id).value.trim(); }
function esc(s)        { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

function yr(name) {
  const m = String(name).match(/\b(19|20)\d{2}\b/g);
  if (!m) return 0;
  const y = parseInt(m[m.length-1]);
  return y>=1900&&y<=2026 ? y : 0;
}

function catIcon(c) {
  const l=c.toLowerCase();
  if(l.includes('ulusal')||l.includes('tr ')) return '🇹🇷';
  if(l.includes('haber')||l.includes('news')) return '📰';
  if(l.includes('spor')||l.includes('sport')) return '⚽';
  if(l.includes('çocuk')||l.includes('kids')||l.includes('cartoon')) return '🧒';
  if(l.includes('belge')||l.includes('doc')) return '🎥';
  if(l.includes('korku')||l.includes('horror')) return '👻';
  if(l.includes('komedi')||l.includes('comedy')) return '😂';
  if(l.includes('aksi')||l.includes('action')) return '💥';
  if(l.includes('müzik')||l.includes('music')) return '🎵';
  if(l.includes('tümü')||l.includes('all')) return '🌐';
  if(l.includes('film')||l.includes('movie')) return '🎬';
  return '📂';
}

document.addEventListener('keydown', e => {
  const modalOpen = document.getElementById('playerModal').classList.contains('open');
  if (e.key==='Escape') { if(modalOpen) closePlayer(); }
  if (modalOpen) {
    if (e.key===' '||e.key==='k') { e.preventDefault(); togglePlay(); }
    if (e.key==='ArrowLeft')  { e.preventDefault(); skipBy(-10); }
    if (e.key==='ArrowRight') { e.preventDefault(); skipBy(10); }
    if (e.key==='f') toggleFullscreen();
    if (e.key==='m') toggleMute();
  }
  if (!modalOpen && e.key==='Enter' && document.getElementById('loginScreen').style.display!=='none') {
    document.querySelector('.btn-login')?.click();
  }
});
</script>
